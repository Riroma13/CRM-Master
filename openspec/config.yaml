# SPDX-License-Identifier: MIT
# SDD Configuration — CRM-Master
# Generated by sdd-init on 2026-07-04
# Mode: hybrid (engram + openspec files)

project:
  name: CRM-Master
  display_name: CRM-Master
  description: SaaS multi-tenant de gestión empresarial
  workspace: /home/ubuntu/.openclaw/workspace/CRM-Master

stack:
  monorepo: turborepo + pnpm@9
  backend:
    framework: NestJS 11
    orm: Prisma 6
    database: PostgreSQL 16 (row-level multi-tenant via tenant_id)
    queues: BullMQ
    validation: Zod + class-validator
  frontend:
    - admin-web: Next.js 15 + React 19 + Tailwind 4 + shadcn/ui
    - tenant-web: Next.js 15 + React 19 + Tailwind 4
  auth: Better-Auth (organizations = tenants)
  infra: Docker + Caddy, VPS, wildcard TLS *.crmmaster.com

conventions:
  git: conventional commits (feat:, fix:, test:, docs:, refactor:)
  sdd_first: true  # no feature without approved spec in docs/specs/
  strict_tdd: true  # test first (must fail) → implement → pass → refactor
  tenant_isolation: critical  # all queries pass through central Prisma extension for tenant_id scoping
  tenant_resolution: by Host header (subdomain), never by URL param or body
  secrets: never log or expose credentials; use env vars or secret manager
  tenant_slugs: unique, immutable, validated against reserved list
  prisma_schema_changes: require ADR or reference to existing one
  code_delivery:
    model_code: opencode-go/kimi-k2.7-code
    model_planning: opencode-go/deepseek-v4-flash

testing:
  strict_tdd: true
  frameworks:
    - runner: jest
      version: "^29.0.0"
      layer: unit + integration + e2e
      location: apps/api
      config: apps/api/jest.config.js
      e2e_config: apps/api/jest-e2e.json
      pattern: "*.spec.ts"
      coverage: collectCoverageFrom configured
    - runner: vitest
      version: "^3.0.0"
      layer: unit
      locations:
        - apps/admin-web
        - apps/tenant-web
        - packages/shared
      config: none found (defaults/inline)
    - runner: doorbell isolation gate
      location: apps/api/test/doorbell/isolation-gate.spec.ts
      description: Multi-tenant data leak detection — critical pre-deploy gate
  linter: ESLint (api), next lint (admin-web, tenant-web)
  type_checker: TypeScript 5.4 strict mode
  formatter: Prettier 3 (semi, singleQuote, tabWidth 2, trailingComma all, printWidth 100)

persistence:
  mode: hybrid
  engram_project_key: crm-master
  openspec_path: openspec/
  artifact_store: hybrid (engram + openspec files)

phase_rules:
  - phase: explore
    allowed: true
    requires_spec: false
  - phase: propose
    allowed: true
    requires_context: true
  - phase: spec
    allowed: true
    requires_approval: true
    template: docs/specs/TEMPLATE.md
  - phase: design
    allowed: true
    requires_adr: when_architectural_change
    adr_template: docs/architecture/adr/TEMPLATE.md
  - phase: tasks
    allowed: true
    requires_spec_approved: true
  - phase: apply
    allowed: true
    requires_tdd: true
    requires_tests_before_code: true
  - phase: verify
    allowed: true
    requires: tests_pass + lint_clean + coverage_80 + no_tenant_leaks
  - phase: archive
    allowed: true
    requires_verification: true

delivery:
  strategy: force-chained
  chain_strategy: stacked-to-main
  review_budget: 400

existing_artifacts:
  specs:
    - docs/specs/SPEC-0001-tenant-onboarding.md (proposed)
    - docs/specs/SPEC-0002-multi-tenant-isolation-auth.md (proposed)
    - docs/specs/SPEC-0003-dashboard-mission-control.md (proposed)
    - docs/specs/SPEC-0004-ficha-cliente-admin.md (proposed)
    - docs/specs/SPEC-0005-tenant-documentos.md (proposed)
    - docs/specs/SPEC-0006-tenant-citas-calendario.md (proposed)
    - docs/specs/SPEC-0007-ci-pipeline-staging.md (proposed)
  adrs:
    - docs/architecture/adr/0001-multi-tenancy-strategy.md (accepted)
  design:
    - docs/DESIGN.md
  workflow:
    - docs/SDD-WORKFLOW.md (proposed)
    - docs/SDD-MODEL-ASSIGNMENTS.md (proposed)
