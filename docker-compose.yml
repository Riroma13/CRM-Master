version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: crm-master-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crmmaster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crmmaster_dev}
      POSTGRES_DB: ${POSTGRES_DB:-crmmaster}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crmmaster} -d ${POSTGRES_DB:-crmmaster}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crm-master-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: crm-master-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - tenant-web
      - admin-web
    # En desarrollo local los servicios corren fuera de Docker (pnpm dev)
    # Caddy se usa solo en producción o si levantas apps en contenedores
    profiles:
      - production

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: crm-master-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    env_file: .env
    volumes:
      - api_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - production

  tenant-web:
    build:
      context: .
      dockerfile: apps/tenant-web/Dockerfile
    container_name: crm-master-tenant-web
    restart: unless-stopped
    ports:
      - "3004:3000"
    env_file: .env
    depends_on:
      - api
    profiles:
      - production

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
    container_name: crm-master-admin-web
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file: .env
    depends_on:
      - api
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  api_storage:
