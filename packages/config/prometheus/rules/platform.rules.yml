groups:
  - name: platform
    interval: 15s
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP error rate ({{ $value | humanizePercentage }})"
          description: "Error rate is {{ $value | humanizePercentage }} — threshold is 5%"

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_ms_bucket[5m])) > 500
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High P99 latency ({{ $value | humanize }}ms)"
          description: "P99 latency is {{ $value | humanize }}ms — threshold is 500ms"

      - alert: QueueBacklog
        expr: bullmq_queue_depth > 1000
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "BullMQ queue backlog ({{ $value }} jobs)"
          description: "Queue depth is {{ $value }} — threshold is 1000"

      - alert: InstanceDown
        expr: up{job="api"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "API instance is down"
          description: "API instance {{ $labels.instance }} has been unreachable for 30s"
